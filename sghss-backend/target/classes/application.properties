
spring.application.name=sghss-backend

# Banco de Dados PostgreSQL) 
# Ajuste host/porta/usuario/senha conforme seu ambiente.
spring.datasource.url=jdbc:postgresql://localhost:5432/sghss_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT 
# IMPORTANTE: gere um secret forte (>= 32 bytes) e mantenha em variavel de ambiente em producao.
jwt.secret=${JWT_SECRET:troque-esta-chave-por-uma-bem-grande-e-aleatoria-em-producao-0123456789}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Criptografia de dados sensiveis 
# Chave AES de 16 caracteres usada para criptografar CPF no banco.
app.encryption.secret-key=${APP_ENC_KEY:ChaveAES16Bytes!}

# Swagger 
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logs 
logging.level.com.vidaplus.sghss=INFO
logging.level.org.springframework.security=INFO
